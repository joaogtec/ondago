<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Barca - OndaGo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        header {
            background: #003580;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { color: white; font-size: 24px; }
        header a { color: white; text-decoration: none; font-size: 14px; opacity: 0.85; }

        .container { max-width: 600px; margin: 40px auto; padding: 0 16px; }
        h2 { color: #003580; margin-bottom: 24px; font-size: 26px; }

        .form-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        input:focus, select:focus { border-color: #003580; }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 24px 0;
        }
        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        .btn-salvar {
            width: 100%;
            background: #003580;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-salvar:hover { background: #0057b8; }
        .flash-erro {
            background: #fdecea;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>🌊 OndaGo</h1>
    <a href="/minha_conta">← Voltar à minha conta</a>
</header>

<div class="container">
    <h2>Editar barca</h2>
    <div class="form-card">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST">
            <p class="section-title">A viagem</p>
            <div class="form-row">
                <div class="form-group">
                    <label>Partida</label>
                    <input type="text" name="origem" value="{{ carona.ponto_partida }}" required>
                </div>
                <div class="form-group">
                    <label>Destino</label>
                    <input type="text" name="destino" value="{{ carona.destino }}" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" name="data" required>
                </div>
                <div class="form-group">
                    <label>Hora</label>
                    <input type="time" name="hora" value="{{ carona.hora }}" required>
                </div>
            </div>

            <hr class="divider">
            <p class="section-title">A barca</p>

            <div class="form-row">
                <div class="form-group">
                    <label>Vagas</label>
                    <input type="number" name="vagas" min="1" max="8" value="{{ carona.vagas_totais }}" required>
                </div>
                <div class="form-group">
                    <label>Prancha máx</label>
                    <select name="prancha">
                        <option {% if carona.tipo_prancha == 'Shortboard' %}selected{% endif %}>Shortboard</option>
                        <option {% if carona.tipo_prancha == 'Longboard' %}selected{% endif %}>Longboard</option>
                        <option {% if carona.tipo_prancha == 'SUP' %}selected{% endif %}>SUP</option>
                        <option {% if carona.tipo_prancha == 'Qualquer' %}selected{% endif %}>Qualquer</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-salvar">Guardar alterações</button>
        </form>
    </div>
</div>

</body>
</html>
