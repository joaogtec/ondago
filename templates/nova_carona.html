<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Barca - Boat Friends</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }

        header {
            background: #003580;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { color: white; font-size: 24px; }
        header a { color: white; text-decoration: none; font-size: 14px; opacity: 0.85; }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 16px;
        }
        h2 { color: #003580; margin-bottom: 24px; font-size: 26px; }

        .form-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus, select:focus { border-color: #003580; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 24px 0;
        }
        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        button {
            width: 100%;
            background: #003580;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover { background: #0057b8; }
    </style>
</head>
<body>

<header>
    <h1>🌊 Boat Friends</h1>
    <a href="/">← Voltar ao mural</a>
</header>

<div class="container">
    <h2>Publicar uma barca</h2>
    <div class="form-card">
        <form method="POST">

            <p class="section-title">O teu perfil</p>
            <div class="form-group">
                <label>Nome</label>
                <input type="text" name="nome" placeholder="O teu nome" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Nível</label>
                    <select name="nivel">
                        <option>Iniciante</option>
                        <option>Intermédio</option>
                        <option>Avançado</option>
                        <option>Pro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>WhatsApp</label>
                    <input type="text" name="telefone" placeholder="9XXXXXXXX" required>
                </div>
            </div>

            <hr class="divider">
            <p class="section-title">A viagem</p>

            <div class="form-row">
                <div class="form-group">
                    <label>Partida</label>
                    <input type="text" name="origem" placeholder="Ex: Lisboa" required>
                </div>
                <div class="form-group">
                    <label>Destino</label>
                    <input type="text" name="destino" placeholder="Ex: Peniche" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" name="data" required>
                </div>
                <div class="form-group">
                    <label>Hora</label>
                    <input type="time" name="hora" required>
                </div>
            </div>

            <hr class="divider">
            <p class="section-title">A barca</p>

            <div class="form-row">
                <div class="form-group">
                    <label>Vagas</label>
                    <input type="number" name="vagas" min="1" max="8" value="3" required>
                </div>
                <div class="form-group">
                    <label>Prancha máx</label>
                    <select name="prancha">
                        <option>Shortboard</option>
                        <option>Longboard</option>
                        <option>SUP</option>
                        <option>Qualquer</option>
                    </select>
                </div>
            </div>

            <button type="submit">🌊 Publicar Barca</button>
        </form>
    </div>
</div>

</body>
</html>
